<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="/frontend/users/users.css">
</head>

<body>
    <div class="header">
        <a href="/frontend/users/users.html" class="nav-link active">Users</a>
        <a href="/frontend/departments/department.html" class="nav-link">Departments</a>
    </div>
    <h2 class="user">รายชื่อผู้ใช้</h2>

    <!-- Toolbar -->
    <div class="toolBar">
        <input type="text" id="searchInput" placeholder=" ค้นหาชื่อผู้ใช้" oninput="onSearch(this.value)">
        <select onchange="onGenderChange(this.value)">
            <option value="">เพศ: ทั้งหมด</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="unspecified">Unspecified</option>
        </select>
        <select id="filterDept" onchange="onDeptChange(this.value)">
            <option value="">แผนก: ทั้งหมด</option>
        </select>
        <select onchange="onSortChange(this.value)">
            <option value="">เรียงลำดับ</option>
            <option value="u.first_name">ชื่อ</option>
            <option value="u.last_name">นามสกุล</option>
            <option value="u.age">อายุ</option>
            <option value="u.created_at">วันที่สร้าง</option>
            <option value="d.name">แผนก</option>
        </select>
        <button class="search-btn" onclick="openCreateUser()">+ เพิ่มผู้ใช้</button>
        <button class="reset-btn" onclick="resetFilters()">รีเซ็ต</button>
    </div>
  <!-- Table -->
<div class="tableDetail">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ชื่อ-นามสกุล</th>
                <th>อายุ</th>
                <th>เพศ</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>ที่อยู่</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="usersTable">
            <tr><td colspan="9">กำลังโหลด...</td></tr>
        </tbody>
    </table>
</div>

<div id="pagination"></div>

<!-- View Modal -->
<div id="viewModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle"></h3>
            <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button class="search-btn" onclick="closeModal('viewModal')">ปิด</button>
        </div>
    </div>
</div>

<!-- Form Modal -->
<div id="formModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="formTitle">เพิ่มผู้ใช้</h3>
            <button class="modal-close" onclick="closeModal('formModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>ชื่อ <span class="required">*</span></label>
                    <input type="text" id="fFirstName" placeholder="ชื่อ">
                </div>
                <div class="form-group">
                    <label>นามสกุล <span class="required">*</span></label>
                    <input type="text" id="fLastName" placeholder="นามสกุล">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>อายุ</label>
                    <input type="number" id="fAge" placeholder="อายุ">
                </div>
                <div class="form-group">
                    <label>เพศ</label>
                    <select id="fGender">
                        <option value="">-- เลือก --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="unspecified">Unspecified</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" id="fEmail" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="fPhone" placeholder="0xx-xxx-xxxx">
            </div>
            <div class="form-group">
                <label>แผนก</label>
                <select id="formDeptId"></select>
            </div>
            <button type="button" class="toggle-addr-btn" onclick="toggleAddr()">📍 ที่อยู่ (เปิด/ปิด)</button>
            <div id="addrSection" class="addr-section">
                <div class="form-row">
                    <div class="form-group">
                        <label>บ้านเลขที่</label>
                        <input type="text" id="fHouseNo">
                    </div>
                    <div class="form-group">
                        <label>ถนน</label>
                        <input type="text" id="fStreet">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>แขวง/ตำบล</label>
                        <input type="text" id="fDistrict">
                    </div>
                    <div class="form-group">
                        <label>จังหวัด</label>
                        <input type="text" id="fProvince">
                    </div>
                </div>
                <div class="form-group">
                    <label>รหัสไปรษณีย์</label>
                    <input type="text" id="fPostal">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="reset-btn" onclick="closeModal('formModal')">ยกเลิก</button>
            <button class="search-btn" onclick="submitUserForm()"> บันทึก</button>
        </div>
    </div>
</div>

    <script src="/frontend/departments/department.js"></script>
    <script src="/frontend/users/users.js"></script>
    <script>
        window.onload = async () => {
            await loadDepartments();
            await loadUsers();
        };
    </script>
</body>

</html>
